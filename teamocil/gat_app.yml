windows:
  - name: back-end
    root: ~/dev/code/gat-app
    layout: main-vertical-flipped
    panes:
      - be foreman start
      - commands:
          - ggpull
          - bers
  - name: back-end-support
    root: ~/dev/code/gat-app
    layout: even-horizontal
    panes:
      - berc
      - echo rails
  - name: customer-portal-app
    root: ~/dev/code/customer-portal-app
    layout: main-vertical-flipped
    panes:  
      - yarn start
      - echo test-runner-app
