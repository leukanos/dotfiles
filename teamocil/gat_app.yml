  #     - npm start
  #     - echo frontend-app
  - name: admin
    root: ~/dev/code/admin-app
    layout: main-vertical-flipped
    panes:  
      - yarn start
      - echo admin
  - name: devops
    root: ~/dev/code/devops-app
    layout: main-vertical-flipped
    panes:
      - commands:
          - ggpull
          - bers -p 3500
      - echo devops-app